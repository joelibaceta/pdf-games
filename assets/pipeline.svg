<svg viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <rect width="860" height="220" fill="#fff"/>

  <text x="430" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Compiler Pipeline</text>

  <!-- Helper: arrow between boxes -->
  <!-- .game file -->
  <rect x="10" y="50" width="110" height="130" rx="7" fill="#111" stroke="none"/>
  <text x="65" y="95" text-anchor="middle" font-size="20" fill="#fff">📄</text>
  <text x="65" y="118" text-anchor="middle" font-size="11" fill="#eee" font-weight="bold">.game</text>
  <text x="65" y="134" text-anchor="middle" font-size="10" fill="#888">source file</text>
  <text x="65" y="162" text-anchor="middle" font-size="9" fill="#666">sprites:</text>
  <text x="65" y="175" text-anchor="middle" font-size="9" fill="#666">  dino at ...</text>

  <!-- arrow -->
  <line x1="122" y1="115" x2="140" y2="115" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="140,110 150,115 140,120" fill="#bbb"/>

  <!-- Lexer -->
  <rect x="152" y="50" width="110" height="130" rx="7" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="207" y="82" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Lexer</text>
  <line x1="162" y1="90" x2="252" y2="90" stroke="#eee" stroke-width="1"/>
  <text x="207" y="108" text-anchor="middle" font-size="9" fill="#555">TK_NAME</text>
  <text x="207" y="122" text-anchor="middle" font-size="9" fill="#555">TK_AT</text>
  <text x="207" y="136" text-anchor="middle" font-size="9" fill="#555">TK_NUMBER</text>
  <text x="207" y="150" text-anchor="middle" font-size="9" fill="#555">TK_PIXEL_ROW</text>
  <text x="207" y="164" text-anchor="middle" font-size="9" fill="#555">TK_IF / TK_OR</text>
  <text x="207" y="178" text-anchor="middle" font-size="9" fill="#888">token stream</text>

  <!-- arrow -->
  <line x1="264" y1="115" x2="282" y2="115" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="282,110 292,115 282,120" fill="#bbb"/>

  <!-- Parser -->
  <rect x="294" y="50" width="110" height="130" rx="7" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="349" y="82" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Parser</text>
  <line x1="304" y1="90" x2="394" y2="90" stroke="#eee" stroke-width="1"/>
  <text x="349" y="108" text-anchor="middle" font-size="9" fill="#555">config: {}</text>
  <text x="349" y="122" text-anchor="middle" font-size="9" fill="#555">sprites: [...]</text>
  <text x="349" y="136" text-anchor="middle" font-size="9" fill="#555">vars: {}</text>
  <text x="349" y="150" text-anchor="middle" font-size="9" fill="#555">events: {</text>
  <text x="349" y="164" text-anchor="middle" font-size="9" fill="#555">  update: [AST]</text>
  <text x="349" y="178" text-anchor="middle" font-size="9" fill="#888">AST (dict tree)</text>

  <!-- arrow -->
  <line x1="406" y1="115" x2="424" y2="115" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="424,110 434,115 424,120" fill="#bbb"/>

  <!-- Codegen -->
  <rect x="436" y="50" width="110" height="130" rx="7" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="491" y="82" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Codegen</text>
  <line x1="446" y1="90" x2="536" y2="90" stroke="#eee" stroke-width="1"/>
  <text x="491" y="108" text-anchor="middle" font-size="9" fill="#555">var _dino_x=50</text>
  <text x="491" y="122" text-anchor="middle" font-size="9" fill="#555">function</text>
  <text x="491" y="134" text-anchor="middle" font-size="9" fill="#555">_on_update(){</text>
  <text x="491" y="148" text-anchor="middle" font-size="9" fill="#555">  Engine.move(</text>
  <text x="491" y="162" text-anchor="middle" font-size="9" fill="#555">  ...)</text>
  <text x="491" y="178" text-anchor="middle" font-size="9" fill="#888">JS + sprite meta</text>

  <!-- arrow -->
  <line x1="548" y1="115" x2="566" y2="115" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="566,110 576,115 566,120" fill="#bbb"/>

  <!-- PDF Writer -->
  <rect x="578" y="50" width="120" height="130" rx="7" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="638" y="82" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">PDF Writer</text>
  <line x1="588" y1="90" x2="688" y2="90" stroke="#eee" stroke-width="1"/>
  <text x="638" y="108" text-anchor="middle" font-size="9" fill="#555">xref table</text>
  <text x="638" y="122" text-anchor="middle" font-size="9" fill="#555">Catalog/Pages</text>
  <text x="638" y="136" text-anchor="middle" font-size="9" fill="#555">AcroForm fields</text>
  <text x="638" y="150" text-anchor="middle" font-size="9" fill="#555">JS stream</text>
  <text x="638" y="164" text-anchor="middle" font-size="9" fill="#555">pixel XObjects</text>
  <text x="638" y="178" text-anchor="middle" font-size="9" fill="#888">raw PDF bytes</text>

  <!-- arrow -->
  <line x1="700" y1="115" x2="718" y2="115" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="718,110 728,115 718,120" fill="#bbb"/>

  <!-- .pdf output -->
  <rect x="730" y="50" width="110" height="130" rx="7" fill="#111" stroke="none"/>
  <text x="785" y="95" text-anchor="middle" font-size="20" fill="#fff">🎮</text>
  <text x="785" y="118" text-anchor="middle" font-size="11" fill="#eee" font-weight="bold">.pdf</text>
  <text x="785" y="134" text-anchor="middle" font-size="10" fill="#888">self-contained</text>
  <text x="785" y="150" text-anchor="middle" font-size="10" fill="#888">open in</text>
  <text x="785" y="164" text-anchor="middle" font-size="10" fill="#888">Acrobat &amp;</text>
  <text x="785" y="178" text-anchor="middle" font-size="10" fill="#888">play</text>

  <!-- bottom note -->
  <text x="430" y="205" text-anchor="middle" font-size="10" fill="#bbb">
    python pdfgame.py build my-game.game -o my-game.pdf
  </text>
</svg>
